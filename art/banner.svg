<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="188" width="800" height="12" rx="0 0 12 12" fill="url(#accent)"/>
  <!-- Shield icon -->
  <path d="M80 50 L120 35 L160 50 L160 100 C160 130 120 155 120 155 C120 155 80 130 80 100 Z"
        fill="none" stroke="url(#accent)" stroke-width="3"/>
  <path d="M105 90 L115 100 L140 75" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="190" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">PQLite</text>
  <text x="190" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">Post-Quantum SQLite</text>
  <text x="190" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">Quantum-resistant database encryption by Dyber, Inc.</text>
  <!-- Version badge -->
  <rect x="640" y="70" width="120" height="28" rx="14" fill="url(#accent)" opacity="0.2"/>
  <rect x="640" y="70" width="120" height="28" rx="14" fill="none" stroke="url(#accent)" stroke-width="1"/>
  <text x="700" y="89" font-family="system-ui, monospace" font-size="13" fill="#06b6d4" text-anchor="middle">v1.0.0</text>
</svg>
