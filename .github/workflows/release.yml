# PQLite Release Pipeline
# Copyright (c) 2025-2026 Dyber, Inc.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: pqlite3-linux-x86_64
          - os: macos-14
            artifact: pqlite3-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev \
            pkg-config tcl tclsh

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja openssl@3 pkg-config tcl-tk

      - name: Install liboqs
        run: |
          git clone --depth 1 --branch 0.12.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON
          ninja -C /tmp/liboqs/build
          sudo ninja -C /tmp/liboqs/build install
          if [ "$(uname)" = "Linux" ]; then sudo ldconfig; fi

      - name: Generate SQLite amalgamation
        run: |
          chmod +x configure
          ./configure
          make sqlite3.c
          make shell.c

      - name: Build PQLite
        run: |
          cmake -S . -B build -GNinja \
            -DPQLITE_PQC=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          mkdir -p dist
          cp build/pqlite3 dist/${{ matrix.artifact }}
          cp LICENSE README.md dist/
          cd dist && shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p final
          find release-artifacts -type f \( -name "pqlite3*" -o -name "*.sha256" \) -exec cp {} final/ \;
          ls -la final/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PQLite ${{ github.ref_name }}
          body: |
            ## PQLite ${{ github.ref_name }}

            **Post-Quantum SQLite** — Quantum-resistant database encryption.
            A product of [Dyber, Inc.](https://github.com/dyber-pqc)

            ### Highlights
            - ML-KEM-768 key encapsulation (FIPS 203)
            - AES-256-GCM page encryption
            - ML-DSA-65 digital signatures (FIPS 204)
            - Column-level encryption, audit logging, data masking
            - Row-level security, FIPS 140-3 mode, encrypted backups
            - Based on SQLite 3.53.0

            ### Downloads
            Verify checksums: `shasum -a 256 -c pqlite3-*.sha256`

            Copyright (c) 2025-2026 Dyber, Inc.
          files: final/*
          draft: false
          prerelease: false
