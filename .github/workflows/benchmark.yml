name: Benchmarks

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev \
            pkg-config tcl tclsh
          git clone --depth 1 --branch 0.12.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON
          ninja -C /tmp/liboqs/build
          sudo ninja -C /tmp/liboqs/build install
          sudo ldconfig

      - name: Generate SQLite amalgamation
        run: |
          ./configure
          make sqlite3.c
          make shell.c

      - name: Build PQLite (PQC ON)
        run: |
          cmake -S . -B build-pqc -GNinja \
            -DPQLITE_PQC=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-pqc

      - name: Build PQLite (PQC OFF — vanilla baseline)
        run: |
          cmake -S . -B build-vanilla -GNinja \
            -DPQLITE_PQC=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build-vanilla

      - name: Run benchmarks
        run: |
          echo "============================================"
          echo "  PQLite Performance Benchmark Suite"
          echo "  Copyright (c) 2025-2026 Dyber, Inc."
          echo "============================================"
          echo ""

          VANILLA=./build-vanilla/pqlite3
          PQC=./build-pqc/pqlite3

          # Generate test SQL
          echo "BEGIN;" > /tmp/bench_insert.sql
          for i in $(seq 1 50000); do
            echo "INSERT INTO bench VALUES($i, 'benchmark data row $i', $i.5);"
          done >> /tmp/bench_insert.sql
          echo "COMMIT;" >> /tmp/bench_insert.sql

          echo "--- INSERT 50,000 rows ---"
          echo "CREATE TABLE bench(id INTEGER PRIMARY KEY, data TEXT, value REAL);" | $VANILLA /tmp/bench_vanilla.db
          echo "CREATE TABLE bench(id INTEGER PRIMARY KEY, data TEXT, value REAL);" | $PQC /tmp/bench_pqc.db

          echo -n "Vanilla:  "
          time $VANILLA /tmp/bench_vanilla.db < /tmp/bench_insert.sql 2>&1

          echo -n "PQLite:   "
          time $PQC /tmp/bench_pqc.db < /tmp/bench_insert.sql 2>&1

          echo ""
          echo "--- SELECT (count + range scan) ---"
          SELECT_SQL="SELECT COUNT(*) FROM bench; SELECT * FROM bench WHERE id BETWEEN 10000 AND 40000;"

          echo -n "Vanilla:  "
          time echo "$SELECT_SQL" | $VANILLA /tmp/bench_vanilla.db > /dev/null 2>&1

          echo -n "PQLite:   "
          time echo "$SELECT_SQL" | $PQC /tmp/bench_pqc.db > /dev/null 2>&1

          echo ""
          echo "--- Database sizes ---"
          ls -lh /tmp/bench_vanilla.db /tmp/bench_pqc.db

          echo ""
          echo "Benchmark complete."
