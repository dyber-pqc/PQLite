name: Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on PQC sources
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=missingInclude \
            --inline-suppr \
            -I src/ \
            -I src/pqc/ \
            --std=c11 \
            src/pqc/*.c 2>&1 | tee cppcheck-report.txt
          echo "cppcheck completed."

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

  memory-safety:
    name: AddressSanitizer Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev \
            pkg-config tcl tclsh
          git clone --depth 1 --branch 0.12.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON
          ninja -C /tmp/liboqs/build
          sudo ninja -C /tmp/liboqs/build install
          sudo ldconfig

      - name: Generate SQLite amalgamation
        run: |
          chmod +x configure autosetup/autosetup-find-tclsh autosetup/autosetup \
            autosetup/autosetup-test-tclsh autosetup/autosetup-config.guess \
            autosetup/autosetup-config.sub 2>/dev/null || true
          ./configure
          make sqlite3.c
          make shell.c

      - name: Build with ASan
        run: |
          cmake -S . -B build -GNinja -DPQLITE_PQC=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
          cmake --build build

      - name: Smoke test under ASan
        run: |
          echo "CREATE TABLE t(x); INSERT INTO t VALUES(1); SELECT * FROM t;" | \
            ./build/pqlite3 :memory:
