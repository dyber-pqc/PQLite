name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }}, PQC=${{ matrix.pqc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        pqc: [ON, OFF]

    steps:
      - name: Checkout PQLite
        uses: actions/checkout@v4

      - name: Install build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev \
            pkg-config tcl tclsh

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja openssl@3 pkg-config tcl-tk

      - name: Install liboqs
        if: matrix.pqc == 'ON'
        run: |
          git clone --depth 1 --branch 0.12.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON
          ninja -C /tmp/liboqs/build
          sudo ninja -C /tmp/liboqs/build install
          if [ "$(uname)" = "Linux" ]; then sudo ldconfig; fi

      - name: Generate SQLite amalgamation
        run: |
          # Use SQLite's own build system to produce sqlite3.c + sqlite3.h + shell.c
          ./configure
          make sqlite3.c
          make shell.c
          ls -la sqlite3.c sqlite3.h shell.c

      - name: Configure PQLite
        run: |
          cmake -S . -B build -GNinja \
            -DPQLITE_PQC=${{ matrix.pqc }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build PQLite
        run: cmake --build build

      - name: Smoke test
        run: |
          echo "SELECT 'PQLite works!';" | ./build/pqlite3 :memory:
          ./build/pqlite3 :memory: ".version"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pqlite3-${{ matrix.os }}-pqc-${{ matrix.pqc }}
          path: build/pqlite3
          if-no-files-found: ignore
